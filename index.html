<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雰雰換算所｜日幣 x 台幣旅行小幫手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EF;
    --cream-deep:#FBEFDD;
    --pink:#FFD3E0;
    --pink-deep:#FF9FB8;
    --mint:#CFF3E6;
    --mint-deep:#7FD9BC;
    --lavender:#E7DDF9;
    --lavender-deep:#B49CE8;
    --ink:#5A4A42;
    --ink-soft:#9C8B82;
    --coral:#FF8C7A;
    --line:#3d3230;
    --white:#FFFFFF;
    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    overflow-x:hidden;
    background:
      radial-gradient(circle at 8% 12%, #FFE7EE 0%, transparent 40%),
      radial-gradient(circle at 92% 18%, #DFF6EC 0%, transparent 38%),
      radial-gradient(circle at 50% 95%, #F2E8FF 0%, transparent 45%),
      var(--cream);
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
    padding:28px 16px 60px;
    min-height:100vh;
  }
  .wrap{max-width:640px;margin:0 auto;}

  /* ---------- header ---------- */
  .header{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--white);
    border:3px solid var(--line);
    border-radius:var(--radius-lg);
    padding:16px 18px;
    box-shadow:6px 6px 0 var(--line);
    position:relative;
    overflow:hidden;
  }
  .header::before{
    content:"";
    position:absolute;
    top:-30px; right:-30px;
    width:110px;height:110px;
    background:var(--pink);
    border-radius:50%;
    opacity:.55;
  }
  .mascot{width:64px;height:64px;flex:none;position:relative;z-index:1;}
  .header h1{
    font-family:'Baloo 2', 'Noto Sans TC', sans-serif;
    font-size:22px;
    margin:0 0 2px;
    letter-spacing:.5px;
    position:relative;z-index:1;
  }
  .header p{
    margin:0;
    font-size:12.5px;
    color:var(--ink-soft);
    position:relative;z-index:1;
  }
  .tape{
    position:absolute;
    top:-10px;
    left:24px;
    width:70px;height:22px;
    background:repeating-linear-gradient(45deg, var(--mint-deep), var(--mint-deep) 6px, var(--mint) 6px, var(--mint) 12px);
    opacity:.85;
    transform:rotate(-8deg);
    border-radius:3px;
    z-index:1;
  }

  /* ---------- card ---------- */
  .card{
    background:var(--white);
    border:3px solid var(--line);
    border-radius:var(--radius-lg);
    padding:20px;
    margin-top:22px;
    box-shadow:6px 6px 0 var(--line);
    position:relative;
  }
  .card-title{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Baloo 2', 'Noto Sans TC', sans-serif;
    font-size:17px;
    margin:0 0 14px;
  }
  .card-title .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--coral);
    border:2px solid var(--line);
  }
  .carrot-icon{width:19px;height:19px;flex:none;}

  /* ---------- converter ---------- */
  .rate-ref-box{
    background:var(--mint);
    border:2px solid var(--line);
    border-radius:var(--radius-md);
    padding:12px 14px;
    margin-bottom:14px;
  }
  .rate-ref-title{font-size:12.5px;font-weight:700;margin-bottom:6px;}
  .rate-ref-grid{
    display:flex;
    gap:18px;
    font-family:'Baloo 2', sans-serif;
    font-size:14px;
    margin-bottom:6px;
  }
  .rate-ref-grid span{
    display:block;
    font-family:'Noto Sans TC', sans-serif;
    font-size:10.5px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:1px;
  }
  .rate-ref-note{font-size:10.5px;color:var(--ink-soft);line-height:1.5;}
  .rate-ref-note a{color:var(--ink);}
  .rate-edit-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    background:var(--cream-deep);
    border:2px dashed var(--pink-deep);
    border-radius:var(--radius-sm);
    padding:10px 12px;
    margin-bottom:16px;
  }
  .rate-edit-row label{font-size:12px;font-weight:700;flex:1 1 100%;}
  .rate-edit-row input{
    width:110px;
    border:2px solid var(--line);
    border-radius:var(--radius-sm);
    padding:6px 8px;
    font-family:'Baloo 2', sans-serif;
    font-size:15px;
    font-weight:700;
    outline:none;
  }
  .rate-edit-hint{font-size:10.5px;color:var(--ink-soft);}
  .conv-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
  }
  .conv-box{
    flex:1;
    min-width:0;
    background:var(--cream-deep);
    border:2.5px solid var(--line);
    border-radius:var(--radius-md);
    padding:12px 14px;
  }
  .conv-box label{
    display:flex;align-items:center;gap:6px;
    font-size:12px;font-weight:700;color:var(--ink-soft);
    margin-bottom:4px;
  }
  .conv-box input{
    width:100%;
    min-width:0;
    border:none;background:transparent;
    font-family:'Baloo 2', sans-serif;
    font-size:24px;font-weight:700;color:var(--ink);
    outline:none;
  }
  .flag{font-size:18px;}
  .swap-btn{
    flex:none;
    width:40px;height:40px;
    border-radius:50%;
    background:var(--pink);
    border:2.5px solid var(--line);
    cursor:pointer;
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:3px 3px 0 var(--line);
    transition:transform .15s;
  }
  .swap-btn:active{transform:translateY(2px);box-shadow:1px 1px 0 var(--line);}
  .updated-note{font-size:11px;color:var(--ink-soft);margin-top:2px;}

  /* ---------- expense form ---------- */
  .form-grid{
    display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1fr);
    gap:10px;
  }
  .field{display:flex;flex-direction:column;gap:4px;min-width:0;}
  .field.full{grid-column:1 / -1;}
  .field label{font-size:11.5px;font-weight:700;color:var(--ink-soft);}
  .field input, .field select{
    width:100%;
    min-width:0;
    border:2px solid var(--line);
    border-radius:var(--radius-sm);
    padding:9px 10px;
    font-family:'Noto Sans TC', sans-serif;
    font-size:14px;
    background:var(--white);
    outline:none;
  }
  .cat-select{display:flex;gap:6px;flex-wrap:wrap;grid-column:1/-1;}
  .cat-chip{
    border:2px solid var(--line);
    border-radius:999px;
    padding:6px 12px;
    font-size:13px;
    cursor:pointer;
    background:var(--white);
    user-select:none;
  }
  .cat-chip.active{background:var(--pink-deep);color:var(--white);}
  .amt-currency{display:flex;flex-wrap:wrap;gap:6px;grid-column:1/-1;min-width:0;}
  .amt-currency input{flex:1 1 100px;min-width:0;width:auto;max-width:100%;}
  .curr-toggle{display:flex;flex:0 0 auto;border:2px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;}
  .curr-toggle button{
    border:none;background:var(--white);
    padding:0 9px;font-size:12px;font-weight:700;cursor:pointer;
    font-family:'Baloo 2', sans-serif;
    white-space:nowrap;
    min-height:34px;
  }
  .curr-toggle button.active{background:var(--mint-deep);color:var(--white);}
  .add-btn{
    margin-top:14px;
    width:100%;
    border:2.5px solid var(--line);
    border-radius:var(--radius-md);
    background:var(--coral);
    color:var(--white);
    font-family:'Baloo 2', sans-serif;
    font-size:15px;font-weight:700;
    padding:11px;
    cursor:pointer;
    box-shadow:4px 4px 0 var(--line);
  }
  .add-btn:active{transform:translateY(2px);box-shadow:2px 2px 0 var(--line);}

  /* ---------- expense list ---------- */
  .filter-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
  }
  .filter-row label{font-size:12px;font-weight:700;color:var(--ink-soft);}
  .filter-row select{
    flex:1;
    border:2px solid var(--line);
    border-radius:var(--radius-sm);
    padding:7px 10px;
    font-family:'Noto Sans TC', sans-serif;
    font-size:13px;
    background:var(--white);
  }
  .date-group-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--cream-deep);
    border-radius:999px;
    padding:5px 12px;
    margin:14px 0 4px;
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
  }
  .date-group-header:first-child{margin-top:2px;}
  .date-group-header .sub-total{color:var(--ink);}
  .pie-wrap{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
  }
  .pie-svg{width:140px;height:140px;flex:none;}
  .pie-legend{flex:1;min-width:160px;display:flex;flex-direction:column;gap:8px;}
  .pie-legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;}
  .pie-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--line);flex:none;}
  .pie-legend-item .lg-label{flex:1;font-weight:700;}
  .pie-legend-item .lg-amt{color:var(--ink-soft);font-size:11.5px;}
  .pie-empty{font-size:13px;color:var(--ink-soft);text-align:center;padding:14px 0;}
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--lavender);
    border:2px solid var(--line);
    border-radius:var(--radius-md);
    padding:12px 16px;
    margin:18px 0 12px;
  }
  .summary-bar .total-num{
    font-family:'Baloo 2', sans-serif;
    font-size:20px;
    font-weight:700;
  }
  .summary-bar .label{font-size:11px;color:var(--ink-soft);font-weight:700;}
  .expense-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 6px;
    border-bottom:2px dashed #E5DACF;
  }
  .expense-item:last-child{border-bottom:none;}
  .exp-emoji{
    width:36px;height:36px;flex:none;
    background:var(--mint);
    border:2px solid var(--line);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;
  }
  .exp-info{flex:1;min-width:0;}
  .exp-name{font-size:14px;font-weight:700;}
  .exp-date{font-size:11px;color:var(--ink-soft);}
  .exp-amt{font-family:'Baloo 2', sans-serif;font-size:15px;font-weight:700;text-align:right;flex:none;}
  .exp-amt small{display:block;font-size:10px;color:var(--ink-soft);font-weight:400;}
  .del-btn{
    flex:none;
    width:26px;height:26px;
    border-radius:50%;
    border:2px solid var(--line);
    background:var(--white);
    cursor:pointer;
    font-size:12px;
    line-height:1;
  }
  .empty-state{
    text-align:center;
    padding:26px 10px 8px;
    color:var(--ink-soft);
    font-size:13px;
  }
  .empty-state .mascot-sm{width:56px;height:56px;margin:0 auto 8px;}

  footer{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    margin-top:26px;
    line-height:1.7;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="tape"></div>
    <svg class="mascot" viewBox="0 0 100 100">
      <g transform="rotate(-8 38 42)">
        <ellipse cx="38" cy="23" rx="8.5" ry="19" fill="#FFF3E8" stroke="#3d3230" stroke-width="3"/>
        <ellipse cx="38" cy="25" rx="4" ry="12.5" fill="#FFD3E0"/>
      </g>
      <g transform="rotate(8 62 42)">
        <ellipse cx="62" cy="23" rx="8.5" ry="19" fill="#FFF3E8" stroke="#3d3230" stroke-width="3"/>
        <ellipse cx="62" cy="25" rx="4" ry="12.5" fill="#FFD3E0"/>
      </g>
      <ellipse cx="50" cy="60" rx="30" ry="26" fill="#FFF3E8" stroke="#3d3230" stroke-width="3"/>
      <circle cx="40" cy="58" r="3" fill="#3d3230"/>
      <circle cx="60" cy="58" r="3" fill="#3d3230"/>
      <ellipse cx="33" cy="66" rx="5" ry="3.5" fill="#FF9FB8" opacity="0.8"/>
      <ellipse cx="67" cy="66" rx="5" ry="3.5" fill="#FF9FB8" opacity="0.8"/>
      <path d="M44 68 Q50 73 56 68" stroke="#3d3230" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="50" cy="82" r="9" fill="#FFE27A" stroke="#3d3230" stroke-width="2.5"/>
      <text x="50" y="86" font-size="9" text-anchor="middle" font-family="Baloo 2" fill="#3d3230">¥</text>
    </svg>
    <div>
      <h1>雰雰換算所</h1>
      <p>日幣 ⇄ 台幣即時匯率・順手記一下旅費 🎒</p>
    </div>
  </div>

  <!-- 匯率換算卡 -->
  <div class="card">
    <div class="card-title"><span class="dot"></span>匯率換算</div>

    <div class="rate-ref-box" id="rateRefBox">
      <div class="rate-ref-title">🏦 臺灣銀行牌告匯率參考（<span id="refDate"></span>）</div>
      <div class="rate-ref-grid">
        <div><span>現金</span><b id="refCashBuy"></b> / <b id="refCashSell"></b></div>
        <div><span>即期</span><b id="refSpotBuy"></b> / <b id="refSpotSell"></b></div>
      </div>
      <div class="rate-ref-note">左＝銀行買入　右＝銀行賣出（換匯時你多半參考「賣出」價）。此為擷取當下的參考值，正式匯兌請以 <a href="https://rate.bot.com.tw/xrt?Lang=zh-TW" target="_blank" rel="noopener">臺灣銀行牌告匯率頁</a> 現場公告為準。</div>
    </div>

    <div class="rate-edit-row">
      <label for="rateInput">目前使用的換算匯率（1 JPY = ? TWD）</label>
      <input id="rateInput" type="number" step="0.0001" inputmode="decimal">
      <span class="rate-edit-hint">可自行改成你當下看到的匯率</span>
    </div>

    <div class="conv-row">
      <div class="conv-box">
        <label><span class="flag">🇯🇵</span> 日圓 JPY</label>
        <input id="jpyInput" type="number" inputmode="decimal" placeholder="0" value="1000">
      </div>
      <button class="swap-btn" id="swapBtn" title="交換方向">⇄</button>
      <div class="conv-box">
        <label><span class="flag">🇹🇼</span> 台幣 TWD</label>
        <input id="twdInput" type="number" inputmode="decimal" placeholder="0">
      </div>
    </div>
    <div class="updated-note" id="updatedNote"></div>
  </div>

  <!-- 新增花費卡 -->
  <div class="card">
    <div class="card-title">
      <svg class="carrot-icon" viewBox="0 0 24 24"><path d="M12 4c4 0 6.6 3.1 5.9 7.6C17.1 16.6 13.6 21 12 22c-1.6-1-5.1-5.4-5.9-10.4C5.4 7.1 8 4 12 4Z" fill="#FF9E5C" stroke="#3d3230" stroke-width="1.4" stroke-linejoin="round"/><path d="M9.3 9.6c1.1-.3 4.3-.3 5.4 0M9 12.8c1.3-.3 4.9-.3 6.2 0" stroke="#3d3230" stroke-width="1" stroke-linecap="round" opacity=".45"/><path d="M12 4c-.5-1.9-.1-3.1.9-3.7M12 4c.6-1.9 2.1-2.7 3.1-2.5M12 4c-1.9-1-3.6-.6-4.2-.1" fill="none" stroke="#4CAF6D" stroke-width="1.6" stroke-linecap="round"/></svg>
      新增一筆旅行花費
    </div>
    <div class="form-grid">
      <div class="field full">
        <label>項目名稱</label>
        <input id="expName" type="text" placeholder="例如：一蘭拉麵、藥妝戰利品…">
      </div>
      <div class="cat-select" id="catSelect"></div>
      <div class="field full">
        <label>金額</label>
        <div class="amt-currency">
          <input id="expAmount" type="number" inputmode="decimal" placeholder="0">
          <div class="curr-toggle" id="currToggle">
            <button data-c="JPY" class="active">JPY</button>
            <button data-c="TWD">TWD</button>
          </div>
        </div>
      </div>
      <div class="field full">
        <label>日期</label>
        <input id="expDate" type="date">
      </div>
    </div>
    <button class="add-btn" id="addBtn">✚ 加進花費本本</button>
  </div>

  <!-- 花費列表卡 -->
  <div class="card">
    <div class="card-title">
      <svg class="carrot-icon" viewBox="0 0 24 24"><path d="M12 4c4 0 6.6 3.1 5.9 7.6C17.1 16.6 13.6 21 12 22c-1.6-1-5.1-5.4-5.9-10.4C5.4 7.1 8 4 12 4Z" fill="#FF9E5C" stroke="#3d3230" stroke-width="1.4" stroke-linejoin="round"/><path d="M9.3 9.6c1.1-.3 4.3-.3 5.4 0M9 12.8c1.3-.3 4.9-.3 6.2 0" stroke="#3d3230" stroke-width="1" stroke-linecap="round" opacity=".45"/><path d="M12 4c-.5-1.9-.1-3.1.9-3.7M12 4c.6-1.9 2.1-2.7 3.1-2.5M12 4c-1.9-1-3.6-.6-4.2-.1" fill="none" stroke="#4CAF6D" stroke-width="1.6" stroke-linecap="round"/></svg>
      旅行花費紀錄
    </div>
    <div class="filter-row">
      <label for="dateFilter">依日期查看</label>
      <select id="dateFilter">
        <option value="all">全部日期</option>
      </select>
    </div>
    <div class="summary-bar">
      <div>
        <div class="label" id="totalLabelTwd">總花費（約）</div>
        <div class="total-num" id="totalTwd">TWD 0</div>
      </div>
      <div style="text-align:right">
        <div class="label">換算日圓</div>
        <div class="total-num" id="totalJpy">¥0</div>
      </div>
    </div>
    <div id="expList"></div>
  </div>

  <!-- 花費分析卡 -->
  <div class="card">
    <div class="card-title">
      <svg class="carrot-icon" viewBox="0 0 24 24"><path d="M12 4c4 0 6.6 3.1 5.9 7.6C17.1 16.6 13.6 21 12 22c-1.6-1-5.1-5.4-5.9-10.4C5.4 7.1 8 4 12 4Z" fill="#FF9E5C" stroke="#3d3230" stroke-width="1.4" stroke-linejoin="round"/><path d="M9.3 9.6c1.1-.3 4.3-.3 5.4 0M9 12.8c1.3-.3 4.9-.3 6.2 0" stroke="#3d3230" stroke-width="1" stroke-linecap="round" opacity=".45"/><path d="M12 4c-.5-1.9-.1-3.1.9-3.7M12 4c.6-1.9 2.1-2.7 3.1-2.5M12 4c-1.9-1-3.6-.6-4.2-.1" fill="none" stroke="#4CAF6D" stroke-width="1.6" stroke-linecap="round"/></svg>
      花費分析（依項目分類）
    </div>
    <div id="pieWrap" class="pie-wrap">
      <svg id="pieChart" viewBox="0 0 120 120" class="pie-svg"></svg>
      <div id="pieLegend" class="pie-legend"></div>
    </div>
  </div>

  <footer>
    匯率為臺灣銀行牌告匯率快照，可於上方手動更新為最新數字，僅供旅遊估算參考，非即時交易匯率<br>
    頁面內小吉祥物為原創插畫，非任何既有角色授權商品 🐰
  </footer>

</div>

<script>
(function(){
  const CATS = [
    {id:'food', label:'餐飲', emoji:'🍜'},
    {id:'transport', label:'交通', emoji:'🚕'},
    {id:'hotel', label:'住宿', emoji:'🏨'},
    {id:'shopping', label:'購物', emoji:'🛍️'},
    {id:'ticket', label:'景點', emoji:'🎫'},
    {id:'other', label:'其他', emoji:'📦'},
  ];
  let selectedCat = 'food';
  let selectedCurr = 'JPY';

  // 臺灣銀行 2026/07/12 牌告匯率快照（JPY，單位：TWD／1 JPY）
  const BOT_SNAPSHOT = {
    date: '2026/07/12',
    cashBuy: 0.1897,
    cashSell: 0.2025,
    spotBuy: 0.1965,
    spotSell: 0.2015
  };
  let rate = BOT_SNAPSHOT.cashSell; // 預設用「現金賣出」＝旅客兌換日圓現鈔時常見的參考值
  let rateTime = null; // 若使用者手動更新過，改為「使用者更新時間」

  const jpyInput = document.getElementById('jpyInput');
  const twdInput = document.getElementById('twdInput');
  const rateInput = document.getElementById('rateInput');
  const updatedNote = document.getElementById('updatedNote');
  const swapBtn = document.getElementById('swapBtn');
  const catSelect = document.getElementById('catSelect');
  const currToggle = document.getElementById('currToggle');
  const expList = document.getElementById('expList');
  const totalTwdEl = document.getElementById('totalTwd');
  const totalJpyEl = document.getElementById('totalJpy');
  const expDate = document.getElementById('expDate');
  expDate.valueAsDate = new Date();

  // build category chips
  CATS.forEach(c=>{
    const chip = document.createElement('div');
    chip.className = 'cat-chip' + (c.id===selectedCat?' active':'');
    chip.textContent = c.emoji + ' ' + c.label;
    chip.dataset.id = c.id;
    chip.onclick = ()=>{
      selectedCat = c.id;
      [...catSelect.children].forEach(el=>el.classList.toggle('active', el.dataset.id===c.id));
    };
    catSelect.appendChild(chip);
  });

  currToggle.querySelectorAll('button').forEach(btn=>{
    btn.onclick = ()=>{
      selectedCurr = btn.dataset.c;
      currToggle.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b===btn));
    };
  });

  function fmt(n, digits){
    if(isNaN(n)) return '0';
    return Number(n).toLocaleString('zh-TW', {maximumFractionDigits: digits===undefined?0:digits});
  }

  function updateFromJpy(){
    if(rate==null) return;
    const v = parseFloat(jpyInput.value);
    if(isNaN(v)){ twdInput.value=''; return; }
    twdInput.value = (v*rate).toFixed(2);
  }
  function updateFromTwd(){
    if(rate==null) return;
    const v = parseFloat(twdInput.value);
    if(isNaN(v)){ jpyInput.value=''; return; }
    jpyInput.value = (v/rate).toFixed(0);
  }
  jpyInput.addEventListener('input', updateFromJpy);
  twdInput.addEventListener('input', updateFromTwd);
  swapBtn.addEventListener('click', ()=>{
    const tmp = jpyInput.value;
    jpyInput.value = twdInput.value ? (parseFloat(twdInput.value)/rate).toFixed(0) : '';
    // simplest: just recompute both directions after swapping displayed roles visually via swap animation skipped; recalc using twd as source
    updateFromTwd();
  });

  // 填入台銀牌告匯率參考框
  document.getElementById('refDate').textContent = BOT_SNAPSHOT.date;
  document.getElementById('refCashBuy').textContent = BOT_SNAPSHOT.cashBuy;
  document.getElementById('refCashSell').textContent = BOT_SNAPSHOT.cashSell;
  document.getElementById('refSpotBuy').textContent = BOT_SNAPSHOT.spotBuy;
  document.getElementById('refSpotSell').textContent = BOT_SNAPSHOT.spotSell;

  function renderUpdatedNote(){
    if(rateTime){
      updatedNote.textContent = '你在 ' + rateTime + ' 手動更新過匯率';
    } else {
      updatedNote.textContent = '目前使用 ' + BOT_SNAPSHOT.date + ' 台銀現金賣出匯率作為預設值，可依需求手動調整';
    }
  }

  async function initRate(){
    // 網頁本身無法連外抓即時匯率，改成：載入使用者上次手動儲存的匯率（若有），否則用內建快照
    if(window.storage){
      try{
        const saved = await window.storage.get('last-rate', false);
        if(saved && saved.value){
          const parsed = JSON.parse(saved.value);
          if(parsed.rate){ rate = parsed.rate; rateTime = parsed.rateTime; }
        }
      }catch(e){ /* 尚無儲存值，使用預設 */ }
    }
    rateInput.value = rate;
    renderUpdatedNote();
    updateFromJpy();
  }

  rateInput.addEventListener('change', async ()=>{
    const v = parseFloat(rateInput.value);
    if(!v || v<=0) { rateInput.value = rate; return; }
    rate = v;
    rateTime = new Date().toLocaleString('zh-TW', {hour12:false});
    renderUpdatedNote();
    updateFromJpy();
    renderExpenses();
    renderTotals();
    renderPieChart();
    if(window.storage){
      try{ await window.storage.set('last-rate', JSON.stringify({rate, rateTime}), false); }catch(e){}
    }
  });

  // ---------- expenses ----------
  let expenses = [];
  let filterDate = 'all';
  const dateFilterEl = document.getElementById('dateFilter');
  const totalLabelTwd = document.getElementById('totalLabelTwd');
  const pieChartEl = document.getElementById('pieChart');
  const pieLegendEl = document.getElementById('pieLegend');

  const CAT_COLORS = {
    food:'#FF8C7A', transport:'#7FD9BC', hotel:'#B49CE8',
    shopping:'#FF9FB8', ticket:'#FFD166', other:'#B7A99A'
  };

  function catInfo(id){ return CATS.find(c=>c.id===id) || CATS[CATS.length-1]; }
  function toTwd(item){ return item.currency==='TWD' ? item.amount : item.amount*rate; }

  function uniqueDatesDesc(){
    const set = new Set(expenses.map(e=>e.date).filter(Boolean));
    return [...set].sort().reverse();
  }

  function refreshDateFilterOptions(){
    const dates = uniqueDatesDesc();
    const prev = filterDate;
    dateFilterEl.innerHTML = '<option value="all">全部日期</option>' +
      dates.map(d=>`<option value="${d}">${d}</option>`).join('');
    if(dates.includes(prev) || prev==='all'){
      dateFilterEl.value = prev;
    } else {
      filterDate = 'all';
      dateFilterEl.value = 'all';
    }
  }

  function getFilteredExpenses(){
    if(filterDate==='all') return expenses;
    return expenses.filter(e=>e.date===filterDate);
  }

  function renderExpenses(){
    expList.innerHTML = '';
    const list = getFilteredExpenses();
    if(list.length===0){
      expList.innerHTML = `<div class="empty-state">
        <svg class="mascot-sm" viewBox="0 0 100 100">
          <ellipse cx="50" cy="60" rx="28" ry="24" fill="#F3EAFC" stroke="#3d3230" stroke-width="3"/>
          <circle cx="40" cy="58" r="2.6" fill="#3d3230"/>
          <circle cx="60" cy="58" r="2.6" fill="#3d3230"/>
          <path d="M42 68 Q50 64 58 68" stroke="#3d3230" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        </svg>
        ${filterDate==='all' ? '還沒有花費紀錄，加一筆看看吧！' : '這天還沒有花費紀錄。'}</div>`;
      return;
    }

    function renderRow(item){
      const info = catInfo(item.category);
      const el = document.createElement('div');
      el.className = 'expense-item';
      const otherAmt = item.currency==='JPY' ? item.amount*rate : item.amount/rate;
      el.innerHTML = `
        <div class="exp-emoji">${info.emoji}</div>
        <div class="exp-info">
          <div class="exp-name">${escapeHtml(item.name || info.label)}</div>
          <div class="exp-date">${item.date || ''}</div>
        </div>
        <div class="exp-amt">${item.currency==='JPY'?'¥':'NT$'}${fmt(item.amount)}
          <small>${item.currency==='JPY' ? '≈NT$'+fmt(otherAmt) : '≈¥'+fmt(otherAmt)}</small>
        </div>
        <button class="del-btn" data-id="${item.id}">✕</button>
      `;
      expList.appendChild(el);
    }

    if(filterDate==='all'){
      const byDate = {};
      list.forEach(item=>{
        const d = item.date || '未填日期';
        (byDate[d] = byDate[d] || []).push(item);
      });
      Object.keys(byDate).sort().reverse().forEach(d=>{
        const dayItems = byDate[d];
        const dayTotal = dayItems.reduce((s,it)=>s+toTwd(it),0);
        const header = document.createElement('div');
        header.className = 'date-group-header';
        header.innerHTML = `<span>📅 ${d}</span><span class="sub-total">NT$${fmt(dayTotal)}</span>`;
        expList.appendChild(header);
        dayItems.slice().reverse().forEach(renderRow);
      });
    } else {
      list.slice().reverse().forEach(renderRow);
    }

    expList.querySelectorAll('.del-btn').forEach(btn=>{
      btn.onclick = async ()=>{
        expenses = expenses.filter(e=>e.id !== btn.dataset.id);
        await saveExpenses();
        refreshDateFilterOptions();
        renderExpenses();
        renderTotals();
        renderPieChart();
      };
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderTotals(){
    const list = getFilteredExpenses();
    let totalTwd = 0;
    list.forEach(item=>{ totalTwd += toTwd(item); });
    const totalJpy = rate ? totalTwd/rate : 0;
    totalJpyEl.textContent = '¥' + fmt(totalJpy);
    totalTwdEl.textContent = 'NT$' + fmt(totalTwd);
    totalLabelTwd.textContent = filterDate==='all' ? '總花費（約）' : filterDate + ' 花費（約）';
  }

  function polarToCartesian(cx, cy, r, angleDeg){
    const a = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  }
  function describeArc(cx, cy, r, startAngle, endAngle){
    const start = polarToCartesian(cx, cy, r, endAngle);
    const end = polarToCartesian(cx, cy, r, startAngle);
    const largeArcFlag = (endAngle - startAngle) <= 180 ? '0' : '1';
    return ['M', cx, cy, 'L', start.x, start.y, 'A', r, r, 0, largeArcFlag, 0, end.x, end.y, 'Z'].join(' ');
  }

  function renderPieChart(){
    const list = getFilteredExpenses();
    const sums = {};
    let total = 0;
    list.forEach(item=>{
      const twd = toTwd(item);
      sums[item.category] = (sums[item.category] || 0) + twd;
      total += twd;
    });
    const cats = Object.keys(sums).filter(k=>sums[k] > 0);

    if(total <= 0 || cats.length === 0){
      pieChartEl.innerHTML = `<circle cx="60" cy="60" r="50" fill="#F4EFE6" stroke="#3d3230" stroke-width="3"/>`;
      pieLegendEl.innerHTML = `<div class="pie-empty">還沒有花費資料可以分析喔 🥧</div>`;
      return;
    }

    if(cats.length === 1){
      pieChartEl.innerHTML = `<circle cx="60" cy="60" r="50" fill="${CAT_COLORS[cats[0]]}" stroke="#3d3230" stroke-width="3"/>`;
    } else {
      let angle = 0;
      let paths = '';
      cats.forEach(cid=>{
        const slice = (sums[cid] / total) * 360;
        paths += `<path d="${describeArc(60,60,50, angle, angle+slice)}" fill="${CAT_COLORS[cid]}" stroke="#3d3230" stroke-width="2.5"/>`;
        angle += slice;
      });
      pieChartEl.innerHTML = paths;
    }

    pieLegendEl.innerHTML = cats
      .sort((a,b)=>sums[b]-sums[a])
      .map(cid=>{
        const info = catInfo(cid);
        const pct = Math.round((sums[cid]/total)*100);
        return `<div class="pie-legend-item">
          <span class="pie-dot" style="background:${CAT_COLORS[cid]}"></span>
          <span class="lg-label">${info.emoji} ${info.label}</span>
          <span class="lg-amt">NT$${fmt(sums[cid])}・${pct}%</span>
        </div>`;
      }).join('');
  }

  dateFilterEl.addEventListener('change', ()=>{
    filterDate = dateFilterEl.value;
    renderExpenses();
    renderTotals();
    renderPieChart();
  });

  async function saveExpenses(){
    if(!window.storage) return;
    try{ await window.storage.set('travel-expenses', JSON.stringify(expenses), false); }catch(e){}
  }

  async function loadExpenses(){
    if(window.storage){
      try{
        const res = await window.storage.get('travel-expenses', false);
        if(res && res.value){ expenses = JSON.parse(res.value); }
      }catch(e){ /* key not found yet */ }
    }
    refreshDateFilterOptions();
    renderExpenses();
    renderTotals();
    renderPieChart();
  }

  document.getElementById('addBtn').addEventListener('click', async ()=>{
    const nameEl = document.getElementById('expName');
    const amtEl = document.getElementById('expAmount');
    const amt = parseFloat(amtEl.value);
    if(!amt || amt<=0){
      amtEl.style.borderColor = '#FF6B6B';
      setTimeout(()=>amtEl.style.borderColor='#3d3230', 800);
      return;
    }
    const item = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name: nameEl.value.trim(),
      category: selectedCat,
      amount: amt,
      currency: selectedCurr,
      date: expDate.value
    };
    expenses.push(item);
    await saveExpenses();
    refreshDateFilterOptions();
    renderExpenses();
    renderTotals();
    renderPieChart();
    nameEl.value=''; amtEl.value='';
  });

  initRate();
  loadExpenses();
})();
</script>
</body>
</html>
