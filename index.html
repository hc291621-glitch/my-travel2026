<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行計畫 · Boarding Pass Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: '#3E6C8E',
          'ink-soft': '#6A93AD',
          amber: '#BFE6FA',
          'amber-deep': '#5FBCE0',
          paper: '#F4FBFF',
          'paper-dim': '#E4F4FC',
          sage: '#7FD1C1',
          coral: '#2FA8D8',
          charcoal: '#33566B',
          lilac: '#A7D8F0',
          butter: '#FFE9A8',
        },
        fontFamily: {
          display: ['"Mochiy Pop One"', '"Zen Maru Gothic"', 'sans-serif'],
          body: ['"Zen Maru Gothic"', 'sans-serif'],
          mono: ['"M PLUS Rounded 1c"', 'monospace'],
        },
      },
    },
  };
</script>
<style>
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  body {
    background-color: #F4FBFF;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(95,188,224,0.18) 1.5px, transparent 0);
    background-size: 24px 24px;
  }

  /* 飄浮白雲裝飾 */
  .cloud-deco {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.9;
  }
  @keyframes driftCloud {
    0% { transform: translateX(0); }
    50% { transform: translateX(14px); }
    100% { transform: translateX(0); }
  }
  .cloud-deco { animation: driftCloud 8s ease-in-out infinite; }

  /* 票根式波浪打孔分隔線(換成天空藍小圓點) */
  .perforation {
    position: relative;
    border-top: 3px dashed #CDEAF8;
  }
  .perforation::before,
  .perforation::after {
    content: '';
    position: absolute;
    top: -12px;
    width: 24px;
    height: 24px;
    background: #F4FBFF;
    border-radius: 9999px;
  }
  .perforation::before { left: -12px; }
  .perforation::after { right: -12px; }

  .stub-notch::before,
  .stub-notch::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    background: #F4FBFF;
    border-radius: 9999px;
    z-index: 5;
  }
  .stub-notch::before { left: -11px; }
  .stub-notch::after { right: -11px; }

  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-thumb { background: #5FBCE0; border-radius: 9999px; }

  .tab-underline {
    position: relative;
  }
  .tab-underline.active {
    color: #3E6C8E;
  }
  .tab-underline.active::after {
    content: '';
    position: absolute;
    left: 8px; right: 8px; bottom: -1px;
    height: 3px;
    background: #5FBCE0;
    border-radius: 9999px;
  }

  input:focus-visible, button:focus-visible, textarea:focus-visible {
    outline: 2px solid #5FBCE0;
    outline-offset: 2px;
  }

  .checkbox-stamp {
    appearance: none;
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border: 2px solid #5FBCE0;
    border-radius: 9999px;
    display: inline-grid;
    place-content: center;
    cursor: pointer;
    flex-shrink: 0;
    background: #F4FBFF;
    transition: background-color .15s ease, border-color .15s ease, transform .15s ease;
  }
  .checkbox-stamp:checked {
    background-color: #2FA8D8;
    border-color: #2FA8D8;
    transform: scale(1.05);
  }
  .checkbox-stamp:checked::after {
    content: '☁';
    color: white;
    font-size: 13px;
    font-weight: 700;
  }

  .fade-in { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body class="font-body text-charcoal min-h-screen pb-24">

  <div class="max-w-2xl mx-auto px-4 pt-8 sm:pt-12">

    <!-- ===== 頁首：藍天白雲夏日旅行風標題卡 ===== -->
    <header class="relative rounded-[28px] shadow-lg shadow-coral/20 overflow-hidden text-white" style="background: linear-gradient(160deg, #6EC6EA 0%, #8ED4F0 45%, #EAF8FF 100%);">
      <!-- 裝飾白雲 -->
      <svg class="absolute top-3 left-4 w-16 opacity-90" viewBox="0 0 100 50" fill="white" aria-hidden="true">
        <ellipse cx="30" cy="32" rx="26" ry="16"/><ellipse cx="55" cy="24" rx="20" ry="18"/><ellipse cx="75" cy="34" rx="18" ry="13"/>
      </svg>
      <svg class="absolute top-16 right-6 w-10 opacity-80" viewBox="0 0 100 50" fill="white" aria-hidden="true">
        <ellipse cx="30" cy="32" rx="26" ry="16"/><ellipse cx="55" cy="24" rx="20" ry="18"/><ellipse cx="75" cy="34" rx="18" ry="13"/>
      </svg>

      <!-- 原創雲朵小鯨魚吉祥物 -->
      <svg class="absolute -bottom-2 -right-3 w-24 sm:w-28 opacity-95 select-none" viewBox="0 0 140 110" aria-hidden="true">
        <ellipse cx="72" cy="90" rx="52" ry="9" fill="#3E6C8E" opacity="0.12"/>
        <path d="M20 60 Q10 40 35 30 Q45 10 75 15 Q100 8 112 28 Q130 32 125 55 Q128 75 105 80 Q95 98 68 92 Q40 98 30 80 Q8 78 20 60 Z" fill="#FFFFFF" stroke="#3E6C8E" stroke-width="3" stroke-linejoin="round"/>
        <path d="M112 40 Q128 34 130 48 Q126 58 112 54 Z" fill="#BFE6FA" stroke="#3E6C8E" stroke-width="3" stroke-linejoin="round"/>
        <circle cx="52" cy="52" r="3.2" fill="#3E6C8E"/>
        <circle cx="72" cy="52" r="3.2" fill="#3E6C8E"/>
        <path d="M56 63 Q62 68 68 63" stroke="#3E6C8E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <ellipse cx="44" cy="60" rx="5" ry="3" fill="#BFE6FA" opacity="0.8"/>
        <ellipse cx="80" cy="60" rx="5" ry="3" fill="#BFE6FA" opacity="0.8"/>
      </svg>

      <div class="flex items-start justify-between px-5 sm:px-7 pt-6 relative">
        <div class="flex-1">
          <p class="text-[11px] tracking-[0.2em] text-white/90 font-mono uppercase mb-1">☀️ Summer Sky Travel Diary ☁️</p>
          <input id="tripTitle" type="text" value="我的旅行計畫"
            class="bg-transparent font-display text-xl sm:text-2xl w-full outline-none placeholder:text-white/50 border-b border-transparent focus:border-white/70 pb-1"
            placeholder="幫這趟旅程取個可愛的名字♡" />
        </div>
        <span class="text-3xl sm:text-4xl select-none ml-2" aria-hidden="true">✈️</span>
      </div>

      <div class="grid grid-cols-3 gap-3 px-5 sm:px-7 pt-6 pb-6 relative">
        <div class="col-span-3 sm:col-span-1">
          <label class="text-[11px] tracking-widest text-white/90 font-mono uppercase block mb-1">📍 目的地</label>
          <input id="destination" type="text" placeholder="想去哪裡呢"
            class="w-full bg-white/25 rounded-xl px-3 py-2 text-lg font-display placeholder:text-white/60 outline-none focus:bg-white/35" />
        </div>
        <div>
          <label class="text-[11px] tracking-widest text-white/90 font-mono uppercase block mb-1">出發 🐣</label>
          <input id="startDate" type="date"
            class="w-full bg-white/25 rounded-xl px-2 py-2 text-sm font-mono outline-none focus:bg-white/35 [color-scheme:dark]" />
        </div>
        <div>
          <label class="text-[11px] tracking-widest text-white/90 font-mono uppercase block mb-1">回程 🎈</label>
          <input id="endDate" type="date"
            class="w-full bg-white/25 rounded-xl px-2 py-2 text-sm font-mono outline-none focus:bg-white/35 [color-scheme:dark]" />
        </div>
      </div>

      <!-- 票根撕線風格分隔 -->
      <div class="relative stub-notch">
        <div class="border-t-2 border-dashed border-white/40"></div>
      </div>

      <div class="flex items-center justify-between px-5 sm:px-7 py-3 text-xs font-mono text-white/90">
        <span>☁️ <span id="tripDaysLabel">尚未設定天數</span></span>
        <span id="tripCountdown">—</span>
      </div>
    </header>

    <!-- ===== Tab 導覽 ===== -->
    <nav class="sticky top-0 z-10 mt-6 bg-paper/90 backdrop-blur rounded-2xl border-2 border-amber/30 shadow-sm shadow-coral/10 flex text-xs sm:text-base font-display">
      <button data-tab="itinerary" class="tab-underline active flex-1 py-3 text-ink/60 transition-colors">🗓️ 每日行程</button>
      <button data-tab="packing" class="tab-underline flex-1 py-3 text-ink/60 transition-colors">🎒 打包清單</button>
      <button data-tab="budget" class="tab-underline flex-1 py-3 text-ink/60 transition-colors">🏖️ 預算小算盤</button>
    </nav>

    <main class="mt-6 space-y-6">

      <!-- ===== 每日行程 Timeline ===== -->
      <section id="panel-itinerary" class="fade-in">
        <div class="flex items-center gap-2 overflow-x-auto pb-1 mb-4" id="dayTabs"></div>

        <div id="dayContent" class="space-y-3"></div>

        <button id="addDayBtn" class="mt-4 w-full border-2 border-dashed border-amber/50 rounded-2xl py-3 text-coral font-display hover:border-coral hover:bg-paper-dim/60 transition-colors">
          ＋ 新增一天 🌤️
        </button>
      </section>

      <!-- ===== 打包清單 ===== -->
      <section id="panel-packing" class="hidden fade-in">
        <div class="bg-white rounded-[24px] border-2 border-amber/25 shadow-sm shadow-coral/10 p-5">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-display text-lg text-ink">🎒 打包清單</h2>
            <span id="packingCounter" class="text-xs font-mono text-coral bg-paper-dim px-3 py-1 rounded-full">0 / 0 已完成</span>
          </div>

          <form id="packingForm" class="flex gap-2 mb-4">
            <input id="packingInput" type="text" placeholder="要帶什麼呢？例如：護照、充電器"
              class="flex-1 border-2 border-amber/25 rounded-xl px-3 py-2 outline-none focus:border-coral bg-paper-dim/40" required />
            <button type="submit" class="bg-coral text-white px-4 rounded-xl font-display hover:bg-amber-deep transition-colors">新增♡</button>
          </form>

          <ul id="packingList" class="space-y-2"></ul>
          <div id="packingEmpty" class="text-center py-6">
            <svg class="w-20 mx-auto mb-2 opacity-80" viewBox="0 0 140 110">
              <path d="M20 60 Q10 40 35 30 Q45 10 75 15 Q100 8 112 28 Q130 32 125 55 Q128 75 105 80 Q95 98 68 92 Q40 98 30 80 Q8 78 20 60 Z" fill="#EAF8FF" stroke="#5FBCE0" stroke-width="3" stroke-linejoin="round"/>
              <path d="M112 40 Q128 34 130 48 Q126 58 112 54 Z" fill="#BFE6FA" stroke="#5FBCE0" stroke-width="3" stroke-linejoin="round"/>
              <circle cx="52" cy="52" r="3.2" fill="#3E6C8E"/>
              <circle cx="72" cy="52" r="3.2" fill="#3E6C8E"/>
              <path d="M56 63 Q62 68 68 63" stroke="#3E6C8E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </svg>
            <p class="text-sm text-ink-soft/70">還沒有任何物品，先從護照開始吧 🛂☀️</p>
          </div>
        </div>
      </section>

      <!-- ===== 預算計算機 ===== -->
      <section id="panel-budget" class="hidden fade-in">
        <div class="bg-white rounded-[24px] border-2 border-amber/25 shadow-sm shadow-coral/10 p-5">
          <h2 class="font-display text-lg text-ink mb-4">🏖️ 預算小算盤</h2>

          <form id="budgetForm" class="grid grid-cols-[1fr_auto_auto] gap-2 mb-4">
            <input id="budgetName" type="text" placeholder="項目名稱，例如：機票"
              class="border-2 border-amber/25 rounded-xl px-3 py-2 outline-none focus:border-coral bg-paper-dim/40" required />
            <input id="budgetAmount" type="number" min="0" step="1" placeholder="金額"
              class="w-28 border-2 border-amber/25 rounded-xl px-3 py-2 outline-none focus:border-coral bg-paper-dim/40 font-mono" required />
            <button type="submit" class="bg-coral text-white px-4 rounded-xl font-display hover:bg-amber-deep transition-colors">新增♡</button>
          </form>

          <ul id="budgetList" class="divide-y divide-amber/20"></ul>
          <div id="budgetEmpty" class="text-center py-6">
            <svg class="w-20 mx-auto mb-2 opacity-80" viewBox="0 0 140 110">
              <path d="M20 60 Q10 40 35 30 Q45 10 75 15 Q100 8 112 28 Q130 32 125 55 Q128 75 105 80 Q95 98 68 92 Q40 98 30 80 Q8 78 20 60 Z" fill="#EAF8FF" stroke="#5FBCE0" stroke-width="3" stroke-linejoin="round"/>
              <path d="M112 40 Q128 34 130 48 Q126 58 112 54 Z" fill="#BFE6FA" stroke="#5FBCE0" stroke-width="3" stroke-linejoin="round"/>
              <circle cx="52" cy="52" r="3.2" fill="#3E6C8E"/>
              <circle cx="72" cy="52" r="3.2" fill="#3E6C8E"/>
              <path d="M56 63 Q62 68 68 63" stroke="#3E6C8E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            </svg>
            <p class="text-sm text-ink-soft/70">還沒有花費紀錄，記下第一筆吧 🧾🌊</p>
          </div>

          <div class="perforation mt-5 pt-5 flex items-center justify-between">
            <span class="font-display text-ink">總花費 💗</span>
            <span id="budgetTotal" class="font-mono font-bold text-2xl text-coral">NT$ 0</span>
          </div>
        </div>
      </section>

    </main>

    <footer class="text-center text-xs text-ink-soft/60 font-mono mt-10 pb-4">
      ☁️ 資料會自動儲存在這個瀏覽器裡 · Bon Voyage ♡
    </footer>
  </div>

<script>
(function () {
  'use strict';

  const STORAGE_KEY = 'travelPlannerData';
  const uid = () => Math.random().toString(36).slice(2, 10);

  const defaultData = () => ({
    tripTitle: '2026年7月 大阪自由行',
    destination: '日本大阪',
    startDate: '2026-07-18',
    endDate: '2026-07-23',
    days: [
      {
        id: uid(), label: 'Day 1（07/18 六）',
        activities: [
          { id: uid(), time: '12:00', place: '關西機場、下榻飯店', note: '' },
          { id: uid(), time: '18:00', place: '心齋橋（固力果跑跑人）、道頓堀', note: '晚餐：吉伊卡哇拉麵豚 心齋橋店｜體驗預約：https://www.kkday.com/zh-tw/product/268084' },
        ],
      },
      {
        id: uid(), label: 'Day 2（07/19 日）',
        activities: [
          { id: uid(), time: '09:00', place: '難波八阪神社、黑門市場', note: '' },
          { id: uid(), time: '12:00', place: 'NAMBA Parks', note: '' },
          { id: uid(), time: '18:00', place: '法善寺橫丁', note: '' },
        ],
      },
      {
        id: uid(), label: 'Day 3（07/20 一）',
        activities: [
          { id: uid(), time: '09:00', place: '京都一日遊：嵐山竹林、渡月橋、嵯峨野觀光鐵道', note: '' },
          { id: uid(), time: '12:00', place: '清水寺、伏見稻荷大社、吉伊卡哇mogumogu本舗', note: '營業至17:30，來不及就算了' },
          { id: uid(), time: '', place: '備案路線', note: '伏見稻荷大社、吉伊卡哇mogumogu本舗／祇園花見小路、八坂神社、二年坂、三年坂、清水寺' },
        ],
      },
      {
        id: uid(), label: 'Day 4（07/21 二）',
        activities: [
          { id: uid(), time: '09:00', place: '勝尾寺', note: '' },
          { id: uid(), time: '12:00', place: '上方浮世繪館、浮世繪版畫製作體驗', note: '14:00 中級體驗，需先預約kkday：https://www.kkday.com/zh-tw/product/271518' },
          { id: uid(), time: '18:00', place: '通天閣、阿倍野HARUKAS', note: '' },
        ],
      },
      {
        id: uid(), label: 'Day 5（07/22 三）',
        activities: [
          { id: uid(), time: '09:00', place: '大阪城公園（天守閣、豐國神社等）', note: '' },
          { id: uid(), time: '18:00', place: '梅田藍天大廈', note: '' },
        ],
      },
      {
        id: uid(), label: 'Day 6（07/23 四）',
        activities: [
          { id: uid(), time: '12:00', place: '關西機場返台', note: '' },
          { id: uid(), time: '', place: '備案（若還有時間）', note: '美國村、四大天王寺' },
        ],
      },
    ],
    packing: [],
    budget: [],
  });

  let data = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultData();
      const parsed = JSON.parse(raw);
      if (!parsed.days || !parsed.days.length) parsed.days = defaultData().days;
      return parsed;
    } catch (e) {
      return defaultData();
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  // ---------- 頁首 ----------
  const tripTitleEl = document.getElementById('tripTitle');
  const destinationEl = document.getElementById('destination');
  const startDateEl = document.getElementById('startDate');
  const endDateEl = document.getElementById('endDate');
  const tripDaysLabel = document.getElementById('tripCountdown');
  const tripDaysCountEl = document.getElementById('tripDaysLabel');

  tripTitleEl.value = data.tripTitle;
  destinationEl.value = data.destination;
  startDateEl.value = data.startDate;
  endDateEl.value = data.endDate;

  tripTitleEl.addEventListener('input', () => { data.tripTitle = tripTitleEl.value; save(); });
  destinationEl.addEventListener('input', () => { data.destination = destinationEl.value; save(); updateHeaderMeta(); });
  startDateEl.addEventListener('change', () => { data.startDate = startDateEl.value; save(); updateHeaderMeta(); });
  endDateEl.addEventListener('change', () => { data.endDate = endDateEl.value; save(); updateHeaderMeta(); });

  function updateHeaderMeta() {
    const dest = data.destination ? data.destination.toUpperCase() : 'TBD';
    if (data.startDate && data.endDate) {
      const s = new Date(data.startDate);
      const e = new Date(data.endDate);
      const diffDays = Math.round((e - s) / 86400000) + 1;
      tripDaysCountEl.textContent = diffDays > 0 ? `${dest} · ${diffDays} 天` : dest;
      const today = new Date(); today.setHours(0,0,0,0);
      const untilTrip = Math.round((s - today) / 86400000);
      if (untilTrip > 0) tripDaysLabel.textContent = `倒數 ${untilTrip} 天`;
      else if (untilTrip === 0) tripDaysLabel.textContent = '今天出發！';
      else tripDaysLabel.textContent = '旅程進行中／已結束';
    } else {
      tripDaysCountEl.textContent = dest;
      tripDaysLabel.textContent = '—';
    }
  }
  updateHeaderMeta();

  // ---------- Tabs ----------
  const tabButtons = document.querySelectorAll('[data-tab]');
  const panels = {
    itinerary: document.getElementById('panel-itinerary'),
    packing: document.getElementById('panel-packing'),
    budget: document.getElementById('panel-budget'),
  };
  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      tabButtons.forEach(b => b.classList.remove('active', 'text-ink'));
      tabButtons.forEach(b => b.classList.add('text-ink/60'));
      btn.classList.add('active', 'text-ink');
      btn.classList.remove('text-ink/60');
      Object.entries(panels).forEach(([key, el]) => {
        el.classList.toggle('hidden', key !== btn.dataset.tab);
      });
    });
  });

  // ================= 每日行程 =================
  const dayTabsEl = document.getElementById('dayTabs');
  const dayContentEl = document.getElementById('dayContent');
  let activeDayId = data.days[0].id;

  function renderDayTabs() {
    dayTabsEl.innerHTML = '';
    data.days.forEach((day, idx) => {
      const btn = document.createElement('button');
      btn.className = `shrink-0 px-4 py-2 rounded-full font-mono text-sm border-2 transition-colors ${
        day.id === activeDayId
          ? 'bg-coral text-white border-coral'
          : 'bg-white text-ink-soft border-amber/30 hover:border-coral'
      }`;
      btn.textContent = day.label;
      btn.addEventListener('click', () => { activeDayId = day.id; renderDayTabs(); renderDayContent(); });
      dayTabsEl.appendChild(btn);

      if (data.days.length > 1) {
        // small remove affordance via double role - keep tab clean, deletion handled in day header instead
      }
    });
  }

  function renderDayContent() {
    const day = data.days.find(d => d.id === activeDayId);
    if (!day) return;
    dayContentEl.innerHTML = '';

    const card = document.createElement('div');
    card.className = 'bg-white rounded-[24px] border-2 border-amber/25 shadow-sm shadow-coral/10 p-5';

    const headerRow = document.createElement('div');
    headerRow.className = 'flex items-center justify-between mb-4';

    const labelInput = document.createElement('input');
    labelInput.value = day.label;
    labelInput.className = 'font-display text-lg text-ink outline-none bg-transparent border-b border-transparent focus:border-coral w-40';
    labelInput.addEventListener('input', () => { day.label = labelInput.value; save(); renderDayTabs(); });
    headerRow.appendChild(labelInput);

    if (data.days.length > 1) {
      const delDayBtn = document.createElement('button');
      delDayBtn.className = 'text-xs font-mono text-ink-soft hover:text-coral transition-colors';
      delDayBtn.textContent = '刪除這天 🗑️';
      delDayBtn.addEventListener('click', () => {
        data.days = data.days.filter(d => d.id !== day.id);
        activeDayId = data.days[0].id;
        save();
        renderDayTabs();
        renderDayContent();
      });
      headerRow.appendChild(delDayBtn);
    }
    card.appendChild(headerRow);

    const list = document.createElement('div');
    list.className = 'space-y-3';

    if (day.activities.length === 0) {
      const emptyWrap = document.createElement('div');
      emptyWrap.className = 'text-center py-6';
      emptyWrap.innerHTML = `
        <svg class="w-20 mx-auto mb-2 opacity-80" viewBox="0 0 140 110">
          <path d="M20 60 Q10 40 35 30 Q45 10 75 15 Q100 8 112 28 Q130 32 125 55 Q128 75 105 80 Q95 98 68 92 Q40 98 30 80 Q8 78 20 60 Z" fill="#EAF8FF" stroke="#5FBCE0" stroke-width="3" stroke-linejoin="round"/>
          <path d="M112 40 Q128 34 130 48 Q126 58 112 54 Z" fill="#BFE6FA" stroke="#5FBCE0" stroke-width="3" stroke-linejoin="round"/>
          <circle cx="52" cy="52" r="3.2" fill="#3E6C8E"/>
          <circle cx="72" cy="52" r="3.2" fill="#3E6C8E"/>
          <path d="M56 63 Q62 68 68 63" stroke="#3E6C8E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
        <p class="text-sm text-ink-soft/70">這天還是空白的，新增第一個景點吧 📍☀️</p>
      `;
      list.appendChild(emptyWrap);
    }

    day.activities
      .slice()
      .sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'))
      .forEach(act => list.appendChild(renderActivityRow(day, act)));

    card.appendChild(list);

    const addBtn = document.createElement('button');
    addBtn.className = 'mt-4 w-full border-2 border-dashed border-amber/40 rounded-xl py-2.5 text-sm text-coral font-display hover:border-coral hover:bg-paper-dim/50 transition-colors';
    addBtn.textContent = '＋ 新增行程 🎫';
    addBtn.addEventListener('click', () => {
      day.activities.push({ id: uid(), time: '', place: '', note: '' });
      save();
      renderDayContent();
      const inputs = dayContentEl.querySelectorAll('[data-role="place"]');
      if (inputs.length) inputs[inputs.length - 1].focus();
    });
    card.appendChild(addBtn);

    dayContentEl.appendChild(card);
  }

  function renderActivityRow(day, act) {
    const row = document.createElement('div');
    row.className = 'flex gap-2 items-start bg-paper-dim/60 rounded-2xl p-3';

    const timeInput = document.createElement('input');
    timeInput.type = 'time';
    timeInput.value = act.time;
    timeInput.className = 'font-mono text-sm border-2 border-amber/25 rounded-xl px-2 py-2 w-[6.5rem] outline-none focus:border-coral bg-white';
    timeInput.addEventListener('change', () => { act.time = timeInput.value; save(); renderDayContent(); });

    const mid = document.createElement('div');
    mid.className = 'flex-1 min-w-0 space-y-1';

    const placeInput = document.createElement('input');
    placeInput.type = 'text';
    placeInput.dataset.role = 'place';
    placeInput.placeholder = '景點名稱 ✨';
    placeInput.value = act.place;
    placeInput.className = 'w-full font-display border-b-2 border-amber/20 focus:border-coral outline-none bg-transparent py-1';
    placeInput.addEventListener('input', () => { act.place = placeInput.value; save(); });

    const noteInput = document.createElement('input');
    noteInput.type = 'text';
    noteInput.placeholder = '活動備忘，例如：預約 14:00 導覽、記得帶雨傘';
    noteInput.value = act.note;
    noteInput.className = 'w-full text-sm text-ink-soft outline-none bg-transparent border-b border-transparent focus:border-coral py-1';
    noteInput.addEventListener('input', () => { act.note = noteInput.value; save(); });

    mid.appendChild(placeInput);
    mid.appendChild(noteInput);

    const delBtn = document.createElement('button');
    delBtn.setAttribute('aria-label', '刪除這個行程');
    delBtn.className = 'text-ink-soft/50 hover:text-coral transition-colors text-lg leading-none px-1 pt-1';
    delBtn.innerHTML = '✕';
    delBtn.addEventListener('click', () => {
      day.activities = day.activities.filter(a => a.id !== act.id);
      save();
      renderDayContent();
    });

    row.appendChild(timeInput);
    row.appendChild(mid);
    row.appendChild(delBtn);
    return row;
  }

  document.getElementById('addDayBtn').addEventListener('click', () => {
    const newDay = { id: uid(), label: `Day ${data.days.length + 1}`, activities: [] };
    data.days.push(newDay);
    activeDayId = newDay.id;
    save();
    renderDayTabs();
    renderDayContent();
  });

  renderDayTabs();
  renderDayContent();

  // ================= 打包清單 =================
  const packingForm = document.getElementById('packingForm');
  const packingInput = document.getElementById('packingInput');
  const packingListEl = document.getElementById('packingList');
  const packingEmptyEl = document.getElementById('packingEmpty');
  const packingCounterEl = document.getElementById('packingCounter');

  function renderPacking() {
    packingListEl.innerHTML = '';
    packingEmptyEl.classList.toggle('hidden', data.packing.length > 0);

    data.packing.forEach(item => {
      const li = document.createElement('li');
      li.className = 'flex items-center gap-3 bg-paper-dim/50 rounded-xl px-3 py-2.5';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.className = 'checkbox-stamp';
      checkbox.checked = item.checked;
      checkbox.addEventListener('change', () => { item.checked = checkbox.checked; save(); renderPacking(); });

      const label = document.createElement('span');
      label.textContent = item.text;
      label.className = `flex-1 ${item.checked ? 'line-through text-ink-soft/40' : 'text-charcoal'}`;

      const delBtn = document.createElement('button');
      delBtn.setAttribute('aria-label', '刪除這個物品');
      delBtn.innerHTML = '✕';
      delBtn.className = 'text-ink-soft/40 hover:text-coral transition-colors px-1';
      delBtn.addEventListener('click', () => {
        data.packing = data.packing.filter(p => p.id !== item.id);
        save();
        renderPacking();
      });

      li.appendChild(checkbox);
      li.appendChild(label);
      li.appendChild(delBtn);
      packingListEl.appendChild(li);
    });

    const doneCount = data.packing.filter(p => p.checked).length;
    packingCounterEl.textContent = `${doneCount} / ${data.packing.length} 已完成`;
  }

  packingForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = packingInput.value.trim();
    if (!text) return;
    data.packing.push({ id: uid(), text, checked: false });
    packingInput.value = '';
    save();
    renderPacking();
  });

  renderPacking();

  // ================= 預算計算機 =================
  const budgetForm = document.getElementById('budgetForm');
  const budgetNameEl = document.getElementById('budgetName');
  const budgetAmountEl = document.getElementById('budgetAmount');
  const budgetListEl = document.getElementById('budgetList');
  const budgetEmptyEl = document.getElementById('budgetEmpty');
  const budgetTotalEl = document.getElementById('budgetTotal');

  function formatCurrency(n) {
    return 'NT$ ' + n.toLocaleString('zh-Hant-TW');
  }

  function renderBudget() {
    budgetListEl.innerHTML = '';
    budgetEmptyEl.classList.toggle('hidden', data.budget.length > 0);

    data.budget.forEach(item => {
      const li = document.createElement('li');
      li.className = 'flex items-center justify-between py-3 gap-3';

      const name = document.createElement('span');
      name.textContent = item.name;
      name.className = 'flex-1 truncate';

      const amount = document.createElement('span');
      amount.textContent = formatCurrency(item.amount);
      amount.className = 'font-mono font-bold text-ink-soft';

      const delBtn = document.createElement('button');
      delBtn.setAttribute('aria-label', '刪除這筆花費');
      delBtn.innerHTML = '✕';
      delBtn.className = 'text-ink-soft/40 hover:text-coral transition-colors px-1';
      delBtn.addEventListener('click', () => {
        data.budget = data.budget.filter(b => b.id !== item.id);
        save();
        renderBudget();
      });

      li.appendChild(name);
      li.appendChild(amount);
      li.appendChild(delBtn);
      budgetListEl.appendChild(li);
    });

    const total = data.budget.reduce((sum, b) => sum + Number(b.amount || 0), 0);
    budgetTotalEl.textContent = formatCurrency(total);
  }

  budgetForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = budgetNameEl.value.trim();
    const amount = Number(budgetAmountEl.value);
    if (!name || !amount || amount < 0) return;
    data.budget.push({ id: uid(), name, amount });
    budgetNameEl.value = '';
    budgetAmountEl.value = '';
    save();
    renderBudget();
    budgetNameEl.focus();
  });

  renderBudget();

})();
</script>
</body>
</html>
